version: "3.9"
services:
  backend:
    build: ./backend
    container_name: iiko-backend
    ports:
      - "3001:3001"
    env_file: .env
    restart: unless-stopped
  frontend:
    build: ./frontend
    container_name: iiko-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
